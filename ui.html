<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f6f6f7; --surface: #ffffff; --surface2: #f1f1f3;
      --border: #e4e4e7; --border2: #d1d1d6; --text: #18181b;
      --text2: #71717a; --text3: #a1a1aa; --accent: #6366f1;
      --green: #22c55e; --red: #ef4444; --amber: #f59e0b;
      --radius: 10px; --radius-sm: 6px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f11; --surface: #18181b; --surface2: #222226;
        --border: #2a2a2e; --border2: #3a3a3f; --text: #fafafa;
        --text2: #a1a1aa; --text3: #52525b; --accent: #818cf8;
        --green: #4ade80; --red: #f87171;
      }
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; }
    .logo-text { font-size: 16px; font-weight: 600; }
    .logo-badge { font-size: 11px; color: var(--text2); background: var(--surface2); border: 1px solid var(--border); padding: 2px 8px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; }
    .status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text2); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--amber); transition: background 0.3s; }
    .status-dot.online { background: var(--green); }
    .status-dot.offline { background: var(--red); }
    .refresh-btn { background: none; border: none; cursor: pointer; color: var(--text3); padding: 4px; border-radius: 4px; font-size: 14px; transition: color 0.15s; }
    .refresh-btn:hover { color: var(--text2); }

    /* ── Mode bar ── */
    .mode-bar {
      display: flex;
      justify-content: center;
      padding: 10px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .toggle-wrap { display: inline-flex; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 3px; }
    .toggle-btn { padding: 6px 18px; font-size: 13px; font-weight: 400; font-family: 'Inter', sans-serif; border: 1px solid transparent; border-radius: 5px; cursor: pointer; color: var(--text2); background: transparent; transition: all 0.15s; }
    .toggle-btn.active { background: var(--surface); border-color: var(--border); color: var(--text); font-weight: 500; }

    /* ── Chat area ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text3);
      text-align: center;
      gap: 10px;
      padding: 2rem;
      pointer-events: none;
    }
    .empty-icon { font-size: 32px; opacity: 0.6; }
    .empty-msg { font-size: 13px; line-height: 1.6; }
    .code-hint { display: inline-block; font-size: 12px; font-family: 'JetBrains Mono', monospace; background: var(--surface2); border: 1px solid var(--border); padding: 4px 12px; border-radius: 4px; margin-top: 6px; color: var(--text2); pointer-events: all; }

    /* Message bubbles */
    .message { display: flex; flex-direction: column; max-width: 78%; }
    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.ai   { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user .bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.ai .bubble {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .message.ai.error .bubble {
      color: var(--red);
      border-color: var(--red);
    }

    /* Thinking dots */
    .thinking .bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text3);
      animation: bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Input bar ── */
    .input-bar {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-bar textarea {
      flex: 1;
      border: 1px solid var(--border2);
      border-radius: 20px;
      outline: none;
      background: var(--surface2);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
      padding: 9px 16px;
      resize: none;
      max-height: 160px;
      overflow-y: auto;
      transition: border-color 0.15s;
    }
    .input-bar textarea:focus { border-color: var(--accent); }
    .input-bar textarea::placeholder { color: var(--text3); }
    .send-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.1s;
    }
    .send-btn:hover:not(:disabled) { opacity: 0.85; transform: scale(1.06); }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <span class="logo-text">LLM Studio</span>
      <span class="logo-badge">flan-t5-base</span>
    </div>
    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusLabel">Checking...</span>
      <button class="refresh-btn" onclick="checkHealth()" title="Refresh">↻</button>
    </div>
  </div>

  <div class="mode-bar">
    <div class="toggle-wrap">
      <button class="toggle-btn active" id="btn-summarize" onclick="setMode('summarize')">≡ Summarize</button>
      <button class="toggle-btn"        id="btn-write"     onclick="setMode('write')">✎ Write</button>
    </div>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">✦</div>
      <p class="empty-msg" id="emptyMsg">Send a message to get started.</p>
    </div>
  </div>

  <div class="input-bar">
    <textarea id="inputText" placeholder="Type a message…" rows="1"></textarea>
    <button class="send-btn" id="sendBtn" disabled title="Send">&#9658;</button>
  </div>

  <script>
    const BASE = window.location.origin;
    let currentMode = "summarize";
    let isLoading = false;

    // ── Health check ──
    async function checkHealth() {
      const dot   = document.getElementById("statusDot");
      const label = document.getElementById("statusLabel");
      dot.className = "status-dot";
      label.textContent = "Checking…";
      try {
        const res = await fetch(BASE + "/health", { signal: AbortSignal.timeout(3000) });
        if (res.ok) {
          dot.className = "status-dot online";
          label.textContent = "Online";
          const em = document.getElementById("emptyMsg");
          if (em) em.textContent = "Send a message to get started.";
          updateSendBtn();
        } else { throw new Error(); }
      } catch {
        dot.className = "status-dot offline";
        label.textContent = "Offline";
        const em = document.getElementById("emptyMsg");
        if (em) em.innerHTML = 'Server not running. Start it with:<br><span class="code-hint">uvicorn server:app --host 0.0.0.0 --port 8000</span>';
        updateSendBtn();
      }
    }

    // ── Mode toggle ──
    function setMode(mode) {
      currentMode = mode;
      document.getElementById("btn-summarize").className = "toggle-btn" + (mode === "summarize" ? " active" : "");
      document.getElementById("btn-write").className     = "toggle-btn" + (mode === "write"     ? " active" : "");
      document.getElementById("inputText").placeholder   = mode === "summarize"
        ? "Paste text to summarize…"
        : "Describe what you want written…";
    }

    // ── Textarea auto-grow ──
    const textarea = document.getElementById("inputText");
    textarea.addEventListener("input", function () {
      this.style.height = "auto";
      this.style.height = Math.min(this.scrollHeight, 160) + "px";
      updateSendBtn();
    });

    // ── Enter to send, Shift+Enter for newline ──
    textarea.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        handleRun();
      }
    });

    document.getElementById("sendBtn").addEventListener("click", handleRun);

    function updateSendBtn() {
      const hasText  = textarea.value.trim().length > 0;
      const isOnline = document.getElementById("statusDot").classList.contains("online");
      document.getElementById("sendBtn").disabled = !hasText || !isOnline || isLoading;
    }

    // ── Chat helpers ──
    function removeEmptyState() {
      const el = document.getElementById("emptyState");
      if (el) el.remove();
    }

    function appendMessage(role, text, extraClass = "") {
      removeEmptyState();
      const chatArea = document.getElementById("chatArea");
      const wrap   = document.createElement("div");
      wrap.className = "message " + role + (extraClass ? " " + extraClass : "");
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;
      wrap.appendChild(bubble);
      chatArea.appendChild(wrap);
      chatArea.scrollTop = chatArea.scrollHeight;
      return wrap;
    }

    function appendThinking() {
      removeEmptyState();
      const chatArea = document.getElementById("chatArea");
      const wrap   = document.createElement("div");
      wrap.className = "message ai thinking";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
      wrap.appendChild(bubble);
      chatArea.appendChild(wrap);
      chatArea.scrollTop = chatArea.scrollHeight;
      return wrap;
    }

    function resolveThinking(wrap, text, isError = false) {
      wrap.classList.remove("thinking");
      if (isError) wrap.classList.add("error");
      wrap.querySelector(".bubble").textContent = text;
      document.getElementById("chatArea").scrollTop = document.getElementById("chatArea").scrollHeight;
    }

    // ── Main run ──
    async function handleRun() {
      if (isLoading) return;
      const text = textarea.value.trim();
      if (!text) return;

      isLoading = true;
      textarea.value = "";
      textarea.style.height = "auto";
      updateSendBtn();

      appendMessage("user", text);
      const thinkingEl = appendThinking();

      const endpoint = currentMode === "summarize" ? "/summarize" : "/write";
      try {
        const res = await fetch(BASE + endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, max_length: 200 })
        });
        if (!res.ok) { const e = await res.json(); throw new Error(e.detail || "Error " + res.status); }
        const data = await res.json();
        resolveThinking(thinkingEl, data.summary || data.output || "No output returned.");
      } catch (err) {
        const msg = (err.message.includes("fetch") || err.message.includes("Failed"))
          ? "Cannot connect to server."
          : err.message;
        resolveThinking(thinkingEl, "⚠ " + msg, true);
      } finally {
        isLoading = false;
        updateSendBtn();
      }
    }

    checkHealth();
    setInterval(checkHealth, 30000);
  </script>
</body>
</html>
