<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f6f6f7; --surface: #ffffff; --surface2: #f1f1f3;
      --border: #e4e4e7; --border2: #d1d1d6; --text: #18181b;
      --text2: #71717a; --text3: #a1a1aa; --accent: #6366f1;
      --green: #22c55e; --red: #ef4444; --red-light: #fef2f2;
      --amber: #f59e0b; --radius: 10px; --radius-sm: 6px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f11; --surface: #18181b; --surface2: #222226;
        --border: #2a2a2e; --border2: #3a3a3f; --text: #fafafa;
        --text2: #a1a1aa; --text3: #52525b; --accent: #818cf8;
        --green: #4ade80; --red: #f87171; --red-light: #1f1215;
      }
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
    .container { width: 100%; max-width: 720px; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; }
    .logo-text { font-size: 16px; font-weight: 600; color: var(--text); }
    .logo-badge { font-size: 11px; color: var(--text2); background: var(--surface2); border: 1px solid var(--border); padding: 2px 8px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; }
    .status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text2); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--amber); transition: background 0.3s; }
    .status-dot.online { background: var(--green); }
    .status-dot.offline { background: var(--red); }
    .refresh-btn { background: none; border: none; cursor: pointer; color: var(--text3); padding: 4px; border-radius: 4px; font-size: 14px; transition: color 0.15s; }
    .refresh-btn:hover { color: var(--text2); }
    .toggle-wrap { display: inline-flex; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 3px; margin-bottom: 1.25rem; }
    .toggle-btn { padding: 6px 18px; font-size: 13px; font-weight: 400; font-family: 'Inter', sans-serif; border: 1px solid transparent; border-radius: 5px; cursor: pointer; color: var(--text2); background: transparent; transition: all 0.15s; }
    .toggle-btn.active { background: var(--surface); border-color: var(--border); color: var(--text); font-weight: 500; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 1rem; }
    .card-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--surface2); }
    .card-label { font-size: 12px; font-weight: 500; color: var(--text2); }
    .char-count { font-size: 12px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
    textarea { width: 100%; border: none; outline: none; background: transparent; font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.65; color: var(--text); padding: 14px; resize: vertical; min-height: 160px; display: block; }
    textarea::placeholder { color: var(--text3); }
    .controls { display: flex; align-items: center; gap: 14px; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .slider-wrap { flex: 1; display: flex; align-items: center; gap: 10px; min-width: 180px; }
    .slider-label { font-size: 13px; color: var(--text2); white-space: nowrap; }
    input[type="range"] { flex: 1; height: 4px; accent-color: var(--accent); cursor: pointer; }
    .slider-val { font-size: 13px; font-weight: 500; color: var(--text); min-width: 32px; text-align: right; font-family: 'JetBrains Mono', monospace; }
    .run-btn { display: flex; align-items: center; gap: 7px; padding: 9px 22px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--surface); color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .run-btn:hover:not(:disabled) { background: var(--surface2); border-color: var(--accent); color: var(--accent); }
    .run-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .error-box { display: flex; align-items: flex-start; gap: 8px; padding: 12px 14px; border-radius: var(--radius-sm); background: var(--red-light); border: 1px solid var(--red); margin-bottom: 1rem; font-size: 13px; color: var(--red); line-height: 1.5; }
    .copy-btn { display: flex; align-items: center; gap: 5px; padding: 4px 10px; font-size: 12px; font-family: 'Inter', sans-serif; cursor: pointer; border: 1px solid var(--border); border-radius: 5px; background: var(--surface); color: var(--text2); transition: all 0.15s; }
    .copy-btn:hover { color: var(--text); }
    .copy-btn.copied { color: var(--green); border-color: var(--green); }
    .output-text { padding: 14px 16px; font-size: 14px; line-height: 1.75; color: var(--text); }
    .empty-state { padding: 2.5rem 2rem; text-align: center; border: 1px dashed var(--border2); border-radius: var(--radius); color: var(--text3); }
    .empty-icon { font-size: 28px; margin-bottom: 10px; opacity: 0.7; }
    .empty-msg { font-size: 13px; line-height: 1.6; }
    .code-hint { display: inline-block; font-size: 12px; font-family: 'JetBrains Mono', monospace; background: var(--surface2); border: 1px solid var(--border); padding: 4px 12px; border-radius: 4px; margin-top: 8px; color: var(--text2); }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .spinning { animation: spin 0.9s linear infinite; display: inline-block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <span class="logo-text">LLM Studio</span>
        <span class="logo-badge">flan-t5-base</span>
      </div>
      <div class="status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusLabel">Checking...</span>
        <button class="refresh-btn" onclick="checkHealth()" title="Refresh">↻</button>
      </div>
    </div>
    <div class="toggle-wrap">
      <button class="toggle-btn active" id="btn-summarize" onclick="setMode('summarize')">≡ Summarize</button>
      <button class="toggle-btn" id="btn-write" onclick="setMode('write')">✎ Write</button>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-label">✏ Input</span>
        <span class="char-count" id="charCount">0 chars</span>
      </div>
      <textarea id="inputText" placeholder="Paste a long article or document to summarize..." oninput="onInput(this)"></textarea>
    </div>
    <div class="controls">
      <div class="slider-wrap">
        <span class="slider-label">Max tokens</span>
        <input type="range" min="50" max="500" step="10" value="200" id="maxLength" oninput="document.getElementById('tokenVal').textContent = this.value" />
        <span class="slider-val" id="tokenVal">200</span>
      </div>
      <button class="run-btn" id="runBtn" onclick="handleRun()" disabled>Run ▷</button>
    </div>
    <div class="error-box" id="errorBox" style="display:none">
      <span>⚠</span><span id="errorMsg"></span>
    </div>
    <div class="card" id="outputCard" style="display:none">
      <div class="card-header">
        <span class="card-label">✦ Output</span>
        <button class="copy-btn" id="copyBtn" onclick="copyOutput()">⎘ Copy</button>
      </div>
      <div class="output-text" id="outputText"></div>
    </div>
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">✦</div>
      <p class="empty-msg" id="emptyMsg">Output will appear here after you run.</p>
    </div>
  </div>
  <script>
    const BASE = "http://localhost:8000";
    let currentMode = "summarize";
    let isLoading = false;

    async function checkHealth() {
      const dot = document.getElementById("statusDot");
      const label = document.getElementById("statusLabel");
      dot.className = "status-dot";
      label.textContent = "Checking...";
      try {
        const res = await fetch(BASE + "/health", { signal: AbortSignal.timeout(3000) });
        if (res.ok) {
          dot.className = "status-dot online";
          label.textContent = "Online";
          document.getElementById("emptyMsg").textContent = "Output will appear here after you run.";
          updateRunBtn();
        } else { throw new Error(); }
      } catch {
        dot.className = "status-dot offline";
        label.textContent = "Offline";
        document.getElementById("emptyMsg").innerHTML = 'Server not running. Start it with:<br><span class="code-hint">uvicorn server:app --host 0.0.0.0 --port 8000</span>';
      }
    }

    function setMode(mode) {
      currentMode = mode;
      document.getElementById("btn-summarize").className = "toggle-btn" + (mode === "summarize" ? " active" : "");
      document.getElementById("btn-write").className = "toggle-btn" + (mode === "write" ? " active" : "");
      document.getElementById("inputText").placeholder = mode === "summarize"
        ? "Paste a long article, report, or document to summarize..."
        : "Write a short essay about the benefits of renewable energy...";
      document.getElementById("outputCard").style.display = "none";
      document.getElementById("errorBox").style.display = "none";
      document.getElementById("emptyState").style.display = "block";
    }

    function onInput(el) {
      document.getElementById("charCount").textContent = el.value.length + " chars";
      updateRunBtn();
    }

    function updateRunBtn() {
      const hasText = document.getElementById("inputText").value.trim().length > 0;
      const isOnline = document.getElementById("statusDot").classList.contains("online");
      document.getElementById("runBtn").disabled = !hasText || !isOnline || isLoading;
    }

    async function handleRun() {
      if (isLoading) return;
      const text = document.getElementById("inputText").value.trim();
      if (!text) return;
      isLoading = true;
      const btn = document.getElementById("runBtn");
      btn.disabled = true;
      btn.innerHTML = '<span class="spinning">↻</span> Running...';
      document.getElementById("outputCard").style.display = "none";
      document.getElementById("errorBox").style.display = "none";
      document.getElementById("emptyState").style.display = "none";
      const maxLength = Number(document.getElementById("maxLength").value);
      const endpoint = currentMode === "summarize" ? "/summarize" : "/write";
      try {
        const res = await fetch(BASE + endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, max_length: maxLength })
        });
        if (!res.ok) { const e = await res.json(); throw new Error(e.detail || "Error " + res.status); }
        const data = await res.json();
        document.getElementById("outputText").textContent = data.summary || data.output || "No output returned.";
        document.getElementById("outputCard").style.display = "block";
      } catch (err) {
        const msg = (err.message.includes("fetch") || err.message.includes("Failed"))
          ? "Cannot connect to server. Make sure uvicorn is running on port 8000."
          : err.message;
        document.getElementById("errorMsg").textContent = msg;
        document.getElementById("errorBox").style.display = "flex";
        document.getElementById("emptyState").style.display = "block";
      } finally {
        isLoading = false;
        btn.innerHTML = "Run ▷";
        updateRunBtn();
      }
    }

    async function copyOutput() {
      const text = document.getElementById("outputText").textContent;
      const btn = document.getElementById("copyBtn");
      try {
        await navigator.clipboard.writeText(text);
        btn.textContent = "✓ Copied!";
        btn.className = "copy-btn copied";
        setTimeout(() => { btn.textContent = "⎘ Copy"; btn.className = "copy-btn"; }, 2000);
      } catch {}
    }

    checkHealth();
    setInterval(checkHealth, 30000);
  </script>
</body>
</html>
